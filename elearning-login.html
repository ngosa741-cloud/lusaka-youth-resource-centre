<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Learning Portal Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

  <!-- Green header bar -->
  <div class="login-header-bar">
    <img src="images/logo.png" alt="Logo">
    <nav>
      <a href="apply.html">Apply Now</a>
      <a href="student-login.html">Student Portal</a>
      <a href="index.html">Home</a>
    </nav>
  </div>

  <!-- Login card -->
  <div class="login-container">
    <h2>E-Learning Portal</h2>
    <p>Welcome back. Sign in to continue.</p>

    <form class="login-form">
      <label for="username">User Name</label>
      <input type="text" id="username" placeholder="Enter your User Name" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your Password" required>

      <a href="#" class="forgot-link">Forgot password?</a>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <p class="new-app">Need to start a new application?</p>
  </div>

</body>
</html>
